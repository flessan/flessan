<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .github-btn {
            background: #24292e;
            transition: all 0.3s ease;
        }

        .github-btn:hover {
            background: #1a1e22;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-white mb-2">💰 FinShare</h1>
            <p class="text-gray-300">Platform Keuangan & Donasi</p>
        </div>

        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Masuk ke Akun Anda</h2>

            <button onclick="loginWithGitHub()"
                class="github-btn w-full py-4 rounded-xl text-white font-semibold flex items-center justify-center gap-3 mb-4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                </svg>
                Masuk dengan GitHub
            </button>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/20"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 text-gray-300 bg-transparent">atau</span>
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" id="quickUserId" placeholder="User ID (dev mode)"
                    class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    value="user_demo">
                <button onclick="quickLogin()"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-semibold transition">
                    Masuk Cepat (Gausa Login)
                </button>
            </div>
        </div>

        <div class="text-center mt-6 text-gray-400 text-sm">
            <p>Dengan masuk, Anda menyetujui Terms of Service</p>
        </div>
    </div>

    <!-- Better Auth Client SDK via CDN -->
    <script type="module">
        import { createAuthClient } from "https://esm.sh/better-auth@latest/client";

        const NEON_AUTH_BASE_URL = 'https://ep-morning-heart-aoh4onl2.neonauth.c-2.ap-southeast-1.aws.neon.tech/neondb/auth';

        window.authClient = createAuthClient({
            baseURL: NEON_AUTH_BASE_URL,
        });

        // Helper: Extract user data dari session response (seperti di React reference)
        function extractUserFromSession(result) {
            if (!result || typeof result !== 'object') return null;

            const r = result;

            // Pola 1: { data: { user, session } }
            if (r.data && typeof r.data === 'object' && r.data !== null) {
                const d = r.data;
                if (d.user) {
                    return {
                        user: {
                            id: d.user.id,
                            name: d.user.name,
                            email: d.user.email,
                            image: d.user.image,
                            emailVerified: d.user.emailVerified,
                        },
                        token: d.session?.token || d.session?.accessToken || null,
                    };
                }
            }

            // Pola 2: { user, session } langsung
            if (r.user) {
                return {
                    user: {
                        id: r.user.id,
                        name: r.user.name,
                        email: r.user.email,
                        image: r.user.image,
                        emailVerified: r.user.emailVerified,
                    },
                    token: r.session?.token || r.session?.accessToken || null,
                };
            }

            return null;
        }

        window.loginWithGitHub = async () => {
            try {
                console.log('🔐 Initiating GitHub sign-in...');
                await window.authClient.signIn.social({
                    provider: "github",
                    callbackURL: window.location.origin + '/index.html',
                });
            } catch (error) {
                console.error('❌ GitHub sign-in error:', error);
                alert('Gagal login dengan GitHub: ' + error.message);
            }
        };

        window.quickLogin = () => {
            const userId = document.getElementById('quickUserId').value.trim() || 'user_demo';
            localStorage.setItem('userId', userId);
            localStorage.setItem('apiKey', 'secret_something_aman');
            window.location.href = '/index.html';
        };

        // Check session on load - AUTO-SAVE GITHUB PROFILE
        (async () => {
            try {
                console.log('🔍 Checking session...');
                const result = await window.authClient.getSession();
                console.log('📡 Session response:', result);

                const extracted = extractUserFromSession(result);

                if (extracted?.user) {
                    console.log('✅ GitHub session found:', extracted.user);

                    const user = extracted.user;

                    // Simpan SEMUA data dari GitHub
                    localStorage.setItem('userId', user.id);
                    localStorage.setItem('apiKey', 'secret_something_aman');

                    const profileData = {
                        user_id: user.id,
                        display_name: user.name || user.email?.split('@')[0] || 'User',
                        avatar_url: user.image || `https://ui-avatars.com/api/?name=${user.name || 'U'}&background=8b5cf6&color=fff`,
                        email: user.email,
                        github_id: user.id,
                    };

                    localStorage.setItem('userProfile', JSON.stringify(profileData));
                    console.log('✅ Profile saved to localStorage:', profileData);

                    // Auto-create/update profile di database dengan avatar GitHub
                    try {
                        const apiUrl = window.location.origin;
                        await fetch(`${apiUrl}/api/profiles/me`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-API-Key': 'secret_something_aman',
                            },
                            body: JSON.stringify({
                                user_id: user.id,
                                display_name: user.name || user.email?.split('@')[0],
                                avatar_url: user.image,
                            }),
                        });
                        console.log('✅ Profile auto-created/updated in DB with GitHub avatar');
                    } catch (error) {
                        console.warn('⚠️ Failed to auto-create profile in DB:', error);
                    }

                    window.location.href = '/index.html';
                }
            } catch (error) {
                console.log('No active session:', error.message);
            }
        })();
    </script>
</body>

</html>
