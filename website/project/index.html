<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LemmeThink</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 50px;
        }

        .cursor {
            display: inline-block;
            animation: blink .7s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>
        <span id="text"></span><span class="cursor">|</span>
    </h1>

    <script>
        const words = [""];
        const text = document.getElementById("text");

        let wordIndex = 0;
        let charIndex = 0;
        let deleting = false;

        function typeEffect() {
            const currentWord = words[wordIndex];

            if (!deleting) {
                text.textContent = currentWord.substring(0, charIndex++);
                if (charIndex > currentWord.length) {
                    deleting = true;
                    setTimeout(typeEffect, 1000); // jeda sebelum hapus
                    return;
                }
            } else {
                text.textContent = currentWord.substring(0, charIndex--);
                if (charIndex < 0) {
                    deleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                }
            }

            setTimeout(typeEffect, deleting ? 80 : 150);
        }

        typeEffect();
    </script>
    <script>
        setTimeout(() => {
            window.location.replace("./whois.htm");
            // window.location.replace("./fastpages.docx");
        }, 2650);
    </script>

</body>

</html>
