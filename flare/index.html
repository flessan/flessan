<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Firewall — Digital Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden}
        body{background:#000;font-family:'Outfit',sans-serif;color:#e8d5c0}
        canvas{display:block;position:fixed;inset:0;touch-action:none}

        .overlay{position:fixed;z-index:10;pointer-events:none;user-select:none}

        .title-block{top:48px;left:48px}
        .title-block h1{
            font-family:'Cinzel',serif;font-weight:900;
            font-size:clamp(1.6rem,4vw,3.4rem);
            letter-spacing:.12em;text-transform:uppercase;line-height:1.05;
            background:linear-gradient(135deg,#ff6b35 0%,#ffd700 45%,#ff3c1a 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .title-block .sub{
            margin-top:10px;font-weight:200;
            font-size:clamp(.6rem,1vw,.85rem);
            letter-spacing:.35em;text-transform:uppercase;
            color:rgba(255,150,70,.4);
        }

        .info-block{bottom:44px;right:48px;text-align:right}
        .info-block p{font-weight:300;font-size:.72rem;letter-spacing:.08em;color:rgba(255,150,70,.25);line-height:1.8}

        .exhibit-label{bottom:44px;left:48px}
        .label-line{display:flex;align-items:center;gap:10px;font-weight:300;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,150,70,.28)}
        .dot{width:6px;height:6px;border-radius:50%;background:#ff5522;animation:pulseDot 2s ease-in-out infinite}
        @keyframes pulseDot{0%,100%{opacity:.35;box-shadow:0 0 4px #ff5522}50%{opacity:1;box-shadow:0 0 14px #ff5522}}

        .cine-bar{position:fixed;left:0;right:0;height:38px;background:#000;z-index:15;pointer-events:none}
        .cine-bar.top{top:0}.cine-bar.bottom{bottom:0}

        .loading-screen{position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:center;justify-content:center;transition:opacity 1.8s ease}
        .loading-screen.done{opacity:0;pointer-events:none}
        .loading-text{font-family:'Cinzel',serif;font-weight:400;font-size:.85rem;letter-spacing:.5em;text-transform:uppercase;color:rgba(255,150,70,.45);animation:loadPulse 1.5s ease-in-out infinite}
        @keyframes loadPulse{0%,100%{opacity:.25}50%{opacity:.75}}

        @media(max-width:640px){
            .title-block{top:52px;left:24px}
            .info-block{right:24px;bottom:48px}
            .exhibit-label{left:24px;bottom:48px}
        }
        @media(prefers-reduced-motion:reduce){
            .dot{animation:none;opacity:.6}
            .loading-text{animation:none;opacity:.5}
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loader"><div class="loading-text">Initializing Exhibit</div></div>
<div class="cine-bar top"></div>
<div class="cine-bar bottom"></div>

<div class="overlay title-block">
    <h1>Global<br>Firewall</h1>
    <div class="sub">Digital Artifact &mdash; Permanent Collection IV</div>
</div>

<div class="overlay info-block">
    <p>Drag to orbit &middot; Scroll to zoom</p>
    <p>Exhibit 001 &sol; Infinite Gallery</p>
</div>

<div class="overlay exhibit-label">
    <div class="label-line"><span class="dot"></span><span>Firewall Active &mdash; Online</span></div>
</div>

<script type="importmap">
{
    "imports":{
        "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {Reflector} from 'three/addons/objects/Reflector.js';
import {ShaderPass} from 'three/addons/postprocessing/ShaderPass.js';

/* ═══════════════════════════════════════
   Scene / Camera / Renderer
   ═══════════════════════════════════════ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.032);

const camera = new THREE.PerspectiveCamera(30, innerWidth/innerHeight, 0.1, 100);
camera.position.set(5, 3.6, 6);

const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.7;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.target.set(0, 1.55, 0);
controls.minDistance = 3;
controls.maxDistance = 13;
controls.minPolarAngle = 0.25;
controls.maxPolarAngle = Math.PI*0.47;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.22;
controls.update();

const mouse = {x:0, y:0};
addEventListener('mousemove', e=>{mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;});

/* ═══════════════════════════════════════
   Floor — Polished concrete + Reflector
   ═══════════════════════════════════════ */
const floorRef = new Reflector(new THREE.PlaneGeometry(40,40),{
    clipBias:0.003, textureWidth:512, textureHeight:512, color:0x18100a
});
floorRef.rotation.x = -Math.PI/2;
scene.add(floorRef);

const concOverlay = new THREE.Mesh(
    new THREE.PlaneGeometry(40,40),
    new THREE.MeshStandardMaterial({color:0x090807, roughness:0.5, metalness:0.45, transparent:true, opacity:0.45})
);
concOverlay.rotation.x = -Math.PI/2;
concOverlay.position.y = 0.002;
concOverlay.receiveShadow = true;
scene.add(concOverlay);

// Warm glow disc beneath pedestal
const glowDisc = new THREE.Mesh(
    new THREE.CircleGeometry(2.8,64),
    new THREE.MeshBasicMaterial({color:0xff4400, transparent:true, opacity:0.07, depthWrite:false, blending:THREE.AdditiveBlending})
);
glowDisc.rotation.x = -Math.PI/2;
glowDisc.position.y = 0.004;
scene.add(glowDisc);

/* ═══════════════════════════════════════
   Hexagonal Pedestal
   ═══════════════════════════════════════ */
const pedMat = new THREE.MeshStandardMaterial({color:0x0c0c0c, roughness:0.88, metalness:0.12});
const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(1.15,1.28,0.55,6), pedMat);
pedestal.position.y = 0.275;
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Top cap with slightly reflective finish
const topCap = new THREE.Mesh(
    new THREE.CylinderGeometry(1.15,1.15,0.018,6),
    new THREE.MeshStandardMaterial({color:0x111111, roughness:0.65, metalness:0.35})
);
topCap.position.y = 0.555;
scene.add(topCap);

// Glowing edge ring
const ringMat = new THREE.MeshBasicMaterial({color:0xff4400, transparent:true, opacity:0.3, blending:THREE.AdditiveBlending, depthWrite:false});
const topRing = new THREE.Mesh(new THREE.TorusGeometry(1.15,0.009,8,6), ringMat);
topRing.rotation.x = Math.PI/2;
topRing.position.y = 0.56;
scene.add(topRing);

// Bottom edge ring (dimmer)
const btmRing = new THREE.Mesh(
    new THREE.TorusGeometry(1.28,0.007,8,6),
    new THREE.MeshBasicMaterial({color:0xff3300, transparent:true, opacity:0.12, blending:THREE.AdditiveBlending, depthWrite:false})
);
btmRing.rotation.x = Math.PI/2;
btmRing.position.y = 0.005;
scene.add(btmRing);

/* ═══════════════════════════════════════
   Holographic Frame
   ═══════════════════════════════════════ */
const frameGrp = new THREE.Group();
const FY = 2.0;
frameGrp.position.y = FY;
scene.add(frameGrp);

const FW=1.5, FH=1.95, FD=1.5, HW=FW/2, HH=FH/2, HD=FD/2;
const cn = [
    new THREE.Vector3(-HW,-HH,-HD), new THREE.Vector3(HW,-HH,-HD),
    new THREE.Vector3(HW,HH,-HD),  new THREE.Vector3(-HW,HH,-HD),
    new THREE.Vector3(-HW,-HH,HD),  new THREE.Vector3(HW,-HH,HD),
    new THREE.Vector3(HW,HH,HD),   new THREE.Vector3(-HW,HH,HD)
];
const eIdx=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];

function mkEdge(a,b){
    const d=new THREE.Vector3().subVectors(b,a);
    const l=Math.max(0.001,d.length());
    const m=new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
    const geo=new THREE.CylinderGeometry(0.011,0.011,l,6);
    const mat=new THREE.MeshBasicMaterial({color:0x44ddff,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.copy(m);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());
    return mesh;
}
eIdx.forEach(([i,j])=>frameGrp.add(mkEdge(cn[i],cn[j])));

// Corner nodes
cn.forEach(c=>{
    const m=new THREE.Mesh(
        new THREE.SphereGeometry(0.024,8,8),
        new THREE.MeshBasicMaterial({color:0x66eeff,transparent:true,opacity:0.75,blending:THREE.AdditiveBlending,depthWrite:false})
    );
    m.position.copy(c);
    frameGrp.add(m);
});

// Holographic panel shader
const holoUni = {uTime:{value:0}};
const holoPanelMat = new THREE.ShaderMaterial({
    uniforms: holoUni,
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
        uniform float uTime;varying vec2 vUv;
        void main(){
            float scan=sin(vUv.y*80.0+uTime*3.0)*0.5+0.5;
            scan=smoothstep(0.35,0.65,scan)*0.12;
            float e=smoothstep(0.0,0.12,vUv.x)*smoothstep(1.0,0.88,vUv.x);
            e*=smoothstep(0.0,0.12,vUv.y)*smoothstep(1.0,0.88,vUv.y);
            float sh=sin(vUv.x*25.0+vUv.y*35.0+uTime*2.0)*0.5+0.5;
            float a=(scan+sh*0.06)*e;
            gl_FragColor=vec4(0.25,0.85,1.0,a);
        }`,
    transparent:true, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending
});

// Panels on each face
[[0,0,HD,0,0],[0,0,-HD,0,0],[HW,0,0,Math.PI/2,0],[-HW,0,0,Math.PI/2,0],[0,HH,0,Math.PI/2,1],[0,-HH,0,Math.PI/2,1]].forEach(([x,y,z,ry,isH])=>{
    const w=isH?FW:FD, h=isH?FD:FH;
    const p=new THREE.Mesh(new THREE.PlaneGeometry(w,h),holoPanelMat);
    p.position.set(x,y,z);
    if(ry) p.rotation.y=ry;
    if(isH) p.rotation.x=Math.PI/2;
    frameGrp.add(p);
});

/* ═══════════════════════════════════════
   Fire Sphere — Custom shader with FBM noise
   ═══════════════════════════════════════ */
const fireUni = {uTime:{value:0}};
const fireMat = new THREE.ShaderMaterial({
    uniforms: fireUni,
    vertexShader:`
        varying vec3 vPos;varying vec3 vNorm;uniform float uTime;
        void main(){
            vPos=position;vNorm=normalize(normalMatrix*normal);
            vec3 p=position;
            float d=sin(p.x*5.0+uTime*2.0)*cos(p.y*4.0+uTime*1.5)*sin(p.z*6.0+uTime)*0.04;
            p+=normal*d;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
        }`,
    fragmentShader:`
        uniform float uTime;varying vec3 vPos;varying vec3 vNorm;
        vec3 hash33(vec3 p){
            p=vec3(dot(p,vec3(127.1,311.7,74.7)),dot(p,vec3(269.5,183.3,246.1)),dot(p,vec3(113.5,271.9,124.6)));
            return-1.0+2.0*fract(sin(p)*43758.5453);
        }
        float snoise(vec3 p){
            vec3 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);
            return mix(mix(mix(dot(hash33(i),f),dot(hash33(i+vec3(1,0,0)),f-vec3(1,0,0)),u.x),
                           mix(dot(hash33(i+vec3(0,1,0)),f-vec3(0,1,0)),dot(hash33(i+vec3(1,1,0)),f-vec3(1,1,0)),u.x),u.y),
                       mix(mix(dot(hash33(i+vec3(0,0,1)),f-vec3(0,0,1)),dot(hash33(i+vec3(1,0,1)),f-vec3(1,0,1)),u.x),
                           mix(dot(hash33(i+vec3(0,1,1)),f-vec3(0,1,1)),dot(hash33(i+vec3(1,1,1)),f-vec3(1,1,1)),u.x),u.y),u.z);
        }
        float fbm(vec3 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*snoise(p);p*=2.0;a*=0.5;}return v;}
        void main(){
            vec3 p=vPos*3.0;float t=uTime*0.35;
            float n1=fbm(p+vec3(0.0,t,0.0));
            float n2=fbm(p*1.4+vec3(t*0.7,-t*0.3,t*0.5));
            float pat=n1*0.6+n2*0.4;
            float v=pat*0.5+0.5;
            vec3 wh=vec3(1.0,.95,.75),yw=vec3(1.0,.7,.15),or=vec3(1.0,.32,.04),rd=vec3(.7,.08,0.0),dk=vec3(.15,.02,0.0);
            vec3 col=v<.2?mix(dk,rd,v/.2):v<.45?mix(rd,or,(v-.2)/.25):v<.7?mix(or,yw,(v-.45)/.25):mix(yw,wh,(v-.7)/.3);
            float fr=pow(1.0-abs(dot(vNorm,vec3(0,0,1))),2.5);
            col+=vec3(1.0,.25,0.0)*fr*0.6;
            float alpha=smoothstep(-0.15,0.25,pat)*0.9+fr*0.35;
            gl_FragColor=vec4(col,clamp(alpha,0.0,1.0));
        }`,
    transparent:true, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending
});

const fireSphere = new THREE.Mesh(new THREE.SphereGeometry(0.45,64,64), fireMat);
scene.add(fireSphere);

// Bright inner core
const coreMat = new THREE.MeshBasicMaterial({color:0xffbb44,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const core = new THREE.Mesh(new THREE.SphereGeometry(0.18,32,32), coreMat);
scene.add(core);

// Outer atmospheric glow
const outerGlowMat = new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.05,side:THREE.BackSide,depthWrite:false,blending:THREE.AdditiveBlending});
const outerGlow = new THREE.Mesh(new THREE.SphereGeometry(0.68,32,32), outerGlowMat);
scene.add(outerGlow);

/* ═══════════════════════════════════════
   Firewall Rings
   ═══════════════════════════════════════ */
const fwRings = [];
const rCfg = [
    {r:0.6, rx:Math.PI/2, rz:0, spd:0.15},
    {r:0.66, rx:Math.PI/2+0.4, rz:0.85, spd:-0.1},
    {r:0.57, rx:Math.PI/2-0.35, rz:-0.65, spd:0.13},
    {r:0.72, rx:0.55, rz:1.2, spd:0.08}
];
rCfg.forEach(c=>{
    const mat=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.2,blending:THREE.AdditiveBlending,depthWrite:false});
    const ring=new THREE.Mesh(new THREE.TorusGeometry(c.r,0.005,8,64),mat);
    ring.rotation.x=c.rx; ring.rotation.z=c.rz;
    ring.userData={spd:c.spd, baseRz:c.rz};
    fwRings.push(ring);
    scene.add(ring);
});

/* ═══════════════════════════════════════
   Fire Particles
   ═══════════════════════════════════════ */
const PC=450;
const pP=new Float32Array(PC*3), pS=new Float32Array(PC),pC=new Float32Array(PC*3),pV=new Float32Array(PC*3);
for(let i=0;i<PC;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=0.15+Math.random()*0.35;
    pP[i*3]=r*Math.sin(ph)*Math.cos(th);
    pP[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pP[i*3+2]=r*Math.cos(ph);
    pS[i]=1.5+Math.random()*4;
    const t=Math.random();
    pC[i*3]=1; pC[i*3+1]=0.25+t*0.55; pC[i*3+2]=t*0.18;
    pV[i*3]=(Math.random()-0.5)*0.008;
    pV[i*3+1]=0.004+Math.random()*0.012;
    pV[i*3+2]=(Math.random()-0.5)*0.008;
}
const pGeo=new THREE.BufferGeometry();
pGeo.setAttribute('position',new THREE.BufferAttribute(pP,3));
pGeo.setAttribute('aSize',new THREE.BufferAttribute(pS,1));
pGeo.setAttribute('aColor',new THREE.BufferAttribute(pC,3));

const pMat=new THREE.ShaderMaterial({
    uniforms:{uPR:{value:renderer.getPixelRatio()}},
    vertexShader:`
        attribute float aSize;attribute vec3 aColor;varying vec3 vCol;uniform float uPR;
        void main(){vCol=aColor;vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*uPR*(180.0/(-mv.z));gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`
        varying vec3 vCol;void main(){float d=length(gl_PointCoord-0.5);
        if(d>0.5)discard;float a=smoothstep(0.5,0.05,d);
        gl_FragColor=vec4(vCol,a*0.65);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
});
const particles=new THREE.Points(pGeo,pMat);
scene.add(particles);

/* ═══════════════════════════════════════
   Ember Particles (rising)
   ═══════════════════════════════════════ */
const EC=120;
const eP=new Float32Array(EC*3),eS=new Float32Array(EC),eC=new Float32Array(EC*3),eLife=new Float32Array(EC);
for(let i=0;i<EC;i++){
    const th=Math.random()*Math.PI*2,r=0.1+Math.random()*0.3;
    eP[i*3]=r*Math.cos(th);
    eP[i*3+1]=-0.2+Math.random()*0.4;
    eP[i*3+2]=r*Math.sin(th);
    eS[i]=1+Math.random()*2.5;
    eC[i*3]=1;eC[i*3+1]=0.5+Math.random()*0.5;eC[i*3+2]=Math.random()*0.15;
    eLife[i]=Math.random();
}
const eGeo=new THREE.BufferGeometry();
eGeo.setAttribute('position',new THREE.BufferAttribute(eP,3));
eGeo.setAttribute('aSize',new THREE.BufferAttribute(eS,1));
eGeo.setAttribute('aColor',new THREE.BufferAttribute(eC,3));
const embers=new THREE.Points(eGeo,pMat);
scene.add(embers);

/* ═══════════════════════════════════════
   Volumetric Light Beams
   ═══════════════════════════════════════ */
const beams=[];
const beamCfg=[
    {pos:[0.6,0,0.3],color:0xff6622,opacity:0.018},
    {pos:[-0.4,0,0.5],color:0xff4400,opacity:0.015},
    {pos:[0.1,0,-0.6],color:0xff8833,opacity:0.012},
    {pos:[-0.5,0,-0.3],color:0xff5511,opacity:0.016}
];
beamCfg.forEach(c=>{
    const geo=new THREE.CylinderGeometry(0.02,0.35,5,12,1,true);
    const mat=new THREE.MeshBasicMaterial({color:c.color,transparent:true,opacity:c.opacity,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    const beam=new THREE.Mesh(geo,mat);
    beam.position.set(c.pos[0],2.5,c.pos[2]);
    scene.add(beam);
    beams.push(beam);
});

/* ═══════════════════════════════════════
   Prismatic Light Leaks
   ═══════════════════════════════════════ */
const leaks=[];
const lCfg=[
    {pos:[1.2,1.8,0.5],color:0xff2200,s:0.35,sp:0.7},
    {pos:[-0.9,2.2,-0.4],color:0xff6600,s:0.28,sp:0.5},
    {pos:[0.4,1.4,-0.9],color:0xffaa00,s:0.22,sp:0.9},
    {pos:[-1.0,1.6,0.7],color:0xff3300,s:0.3,sp:0.6},
    {pos:[0.7,2.4,0.8],color:0xffcc22,s:0.18,sp:1.1},
    {pos:[-0.3,2.6,-0.6],color:0xff4400,s:0.25,sp:0.8}
];
lCfg.forEach(c=>{
    const mat=new THREE.SpriteMaterial({color:c.color,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false});
    const sp=new THREE.Sprite(mat);
    sp.position.set(c.pos[0],c.pos[1],c.pos[2]);
    sp.scale.set(c.s,c.s,1);
    sp.userData={base:c.pos.slice(),sp:c.sp,s:c.s};
    leaks.push(sp);
    scene.add(sp);
});

/* ═══════════════════════════════════════
   Space Distortion Sphere
   ═══════════════════════════════════════ */
const distMat=new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`
        varying vec3 vPos;varying vec3 vNorm;uniform float uTime;
        void main(){
            vPos=position;vNorm=normalize(normalMatrix*normal);
            vec3 p=position;
            float wave=sin(p.x*8.0+uTime*2.0)*sin(p.y*6.0+uTime*1.5)*sin(p.z*7.0+uTime*1.8)*0.02;
            p+=normal*wave;
            gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
        }`,
    fragmentShader:`
        varying vec3 vPos;varying vec3 vNorm;uniform float uTime;
        void main(){
            float fr=pow(1.0-abs(dot(vNorm,vec3(0,0,1))),3.0);
            float shimmer=sin(vPos.x*20.0+uTime*3.0)*sin(vPos.y*15.0+uTime*2.0)*0.5+0.5;
            vec3 col=vec3(1.0,0.4,0.1)*fr*0.15+vec3(0.3,0.6,1.0)*shimmer*fr*0.05;
            float a=fr*0.08;
            gl_FragColor=vec4(col,a);
        }`,
    transparent:true,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending
});
const distSphere=new THREE.Mesh(new THREE.SphereGeometry(0.75,48,48),distMat);
scene.add(distSphere);

/* ═══════════════════════════════════════
   Background Wall & Ambient Details
   ═══════════════════════════════════════ */
const wallMat=new THREE.MeshStandardMaterial({color:0x050505,roughness:0.95,metalness:0.05});
const backWall=new THREE.Mesh(new THREE.PlaneGeometry(30,12),wallMat);
backWall.position.set(0,6,-8);
backWall.receiveShadow=true;
scene.add(backWall);

// Subtle wall accent strip
const stripMat=new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:0.04,blending:THREE.AdditiveBlending,depthWrite:false});
const strip=new THREE.Mesh(new THREE.PlaneGeometry(30,0.02),stripMat);
strip.position.set(0,4,-7.98);
scene.add(strip);

/* ═══════════════════════════════════════
   Lighting
   ═══════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0x0a0808,0.5));

const keyLight=new THREE.SpotLight(0xff6633,4,15,Math.PI/5,0.6,1.5);
keyLight.position.set(3,6,4);
keyLight.target.position.set(0,1.5,0);
keyLight.castShadow=true;
keyLight.shadow.mapSize.set(1024,1024);
keyLight.shadow.camera.near=1;
keyLight.shadow.camera.far=15;
keyLight.shadow.bias=-0.001;
scene.add(keyLight);scene.add(keyLight.target);

const fillLight=new THREE.SpotLight(0x1a2244,0.8,12,Math.PI/4,0.8,2);
fillLight.position.set(-4,4,-2);
fillLight.target.position.set(0,1.5,0);
scene.add(fillLight);scene.add(fillLight.target);

const rimLight=new THREE.PointLight(0xff4400,1.2,8,2);
rimLight.position.set(-2,3,3);
scene.add(rimLight);

const underLight=new THREE.PointLight(0xff3300,0.6,3,2);
underLight.position.set(0,0.65,0);
scene.add(underLight);

const topAccent=new THREE.PointLight(0x4488cc,0.25,8,2);
topAccent.position.set(1,5,1);
scene.add(topAccent);

/* ═══════════════════════════════════════
   Post-processing — Bloom + Vignette + Chromatic
   ═══════════════════════════════════════ */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));

const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.3,0.55,0.18);
composer.addPass(bloom);

// Vignette + Chromatic Aberration pass
const vigShader={
    uniforms:{tDiffuse:{value:null},uTime:{value:0}},
    vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`
        uniform sampler2D tDiffuse;uniform float uTime;varying vec2 vUv;
        void main(){
            vec2 uv=vUv;
            float ca=0.0018;
            float r=texture2D(tDiffuse,uv+vec2(ca,0.0)).r;
            float g=texture2D(tDiffuse,uv).g;
            float b=texture2D(tDiffuse,uv-vec2(ca,0.0)).b;
            vec3 col=vec3(r,g,b);
            float d=length(uv-0.5)*2.0;
            col*=1.0-d*d*0.55;
            col*=smoothstep(0.0,0.15,1.0-d*0.35);
            gl_FragColor=vec4(col,1.0);
        }`
};
const vigPass=new ShaderPass(vigShader);
composer.addPass(vigPass);

/* ═══════════════════════════════════════
   Animation Loop
   ═══════════════════════════════════════ */
const clock=new THREE.Clock();

function animate(){
    requestAnimationFrame(animate);
    const t=clock.getElapsedTime();
    const dt=Math.min(clock.getDelta(),0.05);

    controls.update();

    // Fire sphere time
    fireUni.uTime.value=t;
    holoUni.uTime.value=t;
    distMat.uniforms.uTime.value=t;
    vigPass.uniforms.uTime.value=t;

    // Floating motion
    const floatY=FY+Math.sin(t*0.45)*0.07;
    frameGrp.position.y=floatY;
    fireSphere.position.y=floatY;
    core.position.y=floatY;
    outerGlow.position.y=floatY;
    distSphere.position.y=floatY;

    // Fire sphere slow rotation
    fireSphere.rotation.y=t*0.12;
    fireSphere.rotation.x=Math.sin(t*0.08)*0.1;

    // Core pulse
    const coreScale=1+Math.sin(t*2.5)*0.12;
    core.scale.setScalar(coreScale);
    coreMat.opacity=0.4+Math.sin(t*3)*0.15;

    // Outer glow pulse
    outerGlow.scale.setScalar(1+Math.sin(t*1.5)*0.08);
    outerGlowMat.opacity=0.04+Math.sin(t*2)*0.02;

    // Firewall rings orbit
    fwRings.forEach((ring,i)=>{
        ring.rotation.z=ring.userData.baseRz+t*ring.userData.spd;
        ring.position.y=floatY;
        ring.material.opacity=0.15+Math.sin(t*1.5+i)*0.08;
    });

    // Fire particles update
    const pp=particles.geometry.attributes.position.array;
    for(let i=0;i<PC;i++){
        const i3=i*3;
        pp[i3]+=pV[i3]+Math.sin(t*2+i*0.1)*0.001;
        pp[i3+1]+=pV[i3+1];
        pp[i3+2]+=pV[i3+2]+Math.cos(t*2+i*0.1)*0.001;
        const dx=pp[i3],dy=pp[i3+1]-floatY,dz=pp[i3+2];
        const dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(dist>0.75){
            const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=0.1+Math.random()*0.2;
            pp[i3]=r*Math.sin(ph)*Math.cos(th);
            pp[i3+1]=floatY+r*Math.sin(ph)*Math.sin(th);
            pp[i3+2]=r*Math.cos(ph);
        }
    }
    particles.geometry.attributes.position.needsUpdate=true;

    // Ember particles update (rise and reset)
    const ep=embers.geometry.attributes.position.array;
    for(let i=0;i<EC;i++){
        const i3=i*3;
        eLife[i]+=0.003;
        ep[i3]+=Math.sin(t+i)*0.002;
        ep[i3+1]+=0.006+eLife[i]*0.004;
        ep[i3+2]+=Math.cos(t+i)*0.002;
        if(eLife[i]>1||ep[i3+1]>floatY+1.5){
            const th=Math.random()*Math.PI*2,r=0.05+Math.random()*0.25;
            ep[i3]=r*Math.cos(th);
            ep[i3+1]=floatY-0.2+Math.random()*0.3;
            ep[i3+2]=r*Math.sin(th);
            eLife[i]=0;
        }
    }
    embers.geometry.attributes.position.needsUpdate=true;

    // Prismatic leaks subtle motion
    leaks.forEach((sp,i)=>{
        const d=sp.userData;
        sp.position.x=d.base[0]+Math.sin(t*d.sp+i)*0.08;
        sp.position.y=d.base[1]+Math.cos(t*d.sp*0.7+i*2)*0.06;
        sp.position.z=d.base[2]+Math.sin(t*d.sp*0.5+i*3)*0.08;
        sp.material.opacity=0.08+Math.sin(t*1.2+i*1.5)*0.06;
        const sc=d.s*(1+Math.sin(t*0.8+i)*0.15);
        sp.scale.set(sc,sc,1);
    });

    // Beam subtle animation
    beams.forEach((b,i)=>{
        b.rotation.y=t*0.03+i;
        b.material.opacity=0.012+Math.sin(t*0.5+i)*0.006;
    });

    // Pedestal ring glow pulse
    ringMat.opacity=0.22+Math.sin(t*1.8)*0.1;

    // Glow disc pulse
    glowDisc.material.opacity=0.05+Math.sin(t*1.2)*0.025;

    // Rim light subtle flicker
    rimLight.intensity=1.0+Math.sin(t*3)*0.2+Math.sin(t*7)*0.1;

    // Under light warm flicker
    underLight.intensity=0.5+Math.sin(t*4)*0.15;

    // Mouse influence on lights
    keyLight.position.x=3+mouse.x*0.5;
    keyLight.position.z=4+mouse.y*0.3;

    composer.render();
}

/* ═══════════════════════════════════════
   Resize Handler
   ═══════════════════════════════════════ */
addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
    composer.setSize(innerWidth,innerHeight);
    bloom.setSize(innerWidth,innerHeight);
    pMat.uniforms.uPR.value=renderer.getPixelRatio();
});

/* ═══════════════════════════════════════
   Start
   ═══════════════════════════════════════ */
setTimeout(()=>document.getElementById('loader').classList.add('done'),1800);
animate();

</script>
